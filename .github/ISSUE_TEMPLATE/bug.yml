name: Bug report
description: Report a bug in GoogleMapsApi
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
    validations: {required: true}
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce.
      render: csharp
    validations: {required: true}
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations: {required: true}
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations: {required: true}
  - type: input
    id: version
    attributes:
      label: GoogleMapsApi version
      placeholder: "1.4.7"
    validations: {required: true}
  - type: input
    id: tfm
    attributes:
      label: .NET target framework
      placeholder: "net8.0"
    validations: {required: true}
  - type: input
    id: os
    attributes:
      label: Operating system
    validations: {required: false}
  - type: textarea
    id: extra
    attributes:
      label: Additional context
    validations: {required: false}
